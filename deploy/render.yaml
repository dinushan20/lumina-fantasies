services:
  - type: web
    name: lumina-api
    runtime: docker
    dockerfilePath: ./deploy/Dockerfile.api
    dockerContext: .
    plan: starter
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: API_LOG_LEVEL
        value: INFO
      - key: MODERATION_QUEUE_THRESHOLD
        value: "92"
      - key: WEB_APP_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: INTERNAL_API_SHARED_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_BASIC_ID
        sync: false
      - key: STRIPE_PRICE_PREMIUM_ID
        sync: false
      - key: STRIPE_PRICE_VIP_ID
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_VOICE_ID
        sync: false
      - key: LLM_BASE_URL
        sync: false
      - key: LLM_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
